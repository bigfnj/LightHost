name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Windows (MSVC / VS 2026)
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/release
          key: windows-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: windows-release-

      - name: Configure (VS 2026 Release preset)
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

  build-linux:
    name: Linux (GCC / Ninja)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JUCE Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/ninja-release
          key: linux-ninja-release-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: linux-ninja-release-

      - name: Configure (Ninja Release preset)
        run: cmake --preset ninja-release

      - name: Build
        run: cmake --build build/ninja-release -j$(nproc)
